name: Android CI

# Read-only token; no fork PR can write back to the repo via this workflow.
# `pull-requests: read` is needed by the `changes` job's paths-filter step
# (it queries the GitHub API for the PR's changed-file list).
permissions:
  contents: read
  pull-requests: read

on:
  pull_request: # Triggers on any pull request

# Cancel in-progress runs when a new commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Third-party actions are pinned to commit SHAs (with the version tag in a
# trailing comment) to neutralize supply-chain risk: a compromised upstream
# action can't silently swap behavior under us. Dependabot's `github-actions`
# ecosystem auto-bumps these on a weekly cadence.
jobs:
  changes:
    # Classifies the PR's diff as `code` (anything that affects build output)
    # or pure docs. Docs-only PRs short-circuit the heavy gradle gates below
    # via `if: needs.changes.outputs.code == 'true'` — saving ~7 minutes of
    # CI wall-clock per text-only change. The workflow still triggers so the
    # required checks report (skipped == pass for branch protection); only
    # the gradle work is gated.
    #
    # Implementation note: this uses `gh pr diff --name-only` (built-in GitHub
    # CLI, preinstalled on runners) rather than a third-party action like
    # dorny/paths-filter. The repo's GitHub Actions allow-list rejects any
    # action not from a verified-marketplace creator or the same owner, so
    # forks of this template inherit the same gating without having to
    # configure an allow-list exception.
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Classify diff (code vs docs-only)
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          changed=$(gh pr diff "$PR_NUMBER" --name-only)
          echo "Changed files in PR #$PR_NUMBER:"
          printf '  %s\n' "$changed"
          # Anything that's NOT a .md file, NOT under docs/ or
          # .github/ISSUE_TEMPLATE/, and NOT a LICENSE* counts as "code".
          code=$(printf '%s\n' "$changed" \
            | grep -vE '(\.md$|^LICENSE|^docs/|^\.github/ISSUE_TEMPLATE/)' \
            || true)
          if [ -n "$code" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Code/build changes detected — gradle gates will run."
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Docs-only PR — gradle gates will be skipped."
          fi

  build_and_test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        # Auto-handles Gradle caching, dependency submission, and Wrapper validation.
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run Spotless Check
        run: ./gradlew spotlessCheck

      - name: Run Lint Release Checks
        run: ./gradlew lintRelease

      - name: Run unit tests
        run: ./gradlew test

      - name: Generate Kover coverage report
        # Aggregated under root build/reports/kover; XML feeds external coverage
        # services (Codecov, Coveralls, etc.) when adopters wire one in.
        run: ./gradlew koverXmlReport koverHtmlReport

      - name: Verify module graph is up to date
        # `:moduleGraph` is deterministic; if a contributor changed module deps
        # without committing the regenerated `docs/MODULE_GRAPH.md`, this step
        # fails with a clear diff.
        run: |
          ./gradlew moduleGraph
          git diff --exit-code -- docs/MODULE_GRAPH.md || (
            echo "::error::docs/MODULE_GRAPH.md is out of date. Run './gradlew moduleGraph' and commit the result." && exit 1
          )

      - name: Assemble release APK
        # Catches release-only build regressions (resource shrinking, R8 keep
        # rules, etc.) that the unit-test path can't surface.
        run: ./gradlew assembleRelease

      - name: Upload lint + unit test + coverage reports
        # Always upload reports — they're most useful when the build above fails.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-reports
          path: |
            **/build/reports/lint-results-*.html
            **/build/reports/tests/**
            build/reports/kover/**
          if-no-files-found: ignore
          retention-days: 7

  instrumented_tests:
    # Runs the Gradle Managed Device (pixel6api30, aosp-atd) registered by the
    # convention plugins. Not yet wired into branch protection — opt in via the
    # repo's required-checks settings once GMD has run a few times reliably.
    # Same paths-filter gate as `build_and_test` — docs-only PRs skip the GMD
    # cycle entirely.
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Enable KVM for emulator acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Accept Android SDK licenses
        # The runner has the emulator license accepted but not aosp_atd system
        # images. Pre-accept everything so AGP can install the missing package.
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null

      - name: Cache AVD system image
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-pixel6api30-${{ hashFiles('build-logic/**/*.kt', 'build-logic/**/*.gradle.kts') }}

      - name: Run instrumented tests on pixel6api30
        run: ./gradlew pixel6api30DebugAndroidTest

      - name: Upload instrumented test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: instrumented-test-reports
          path: '**/build/reports/androidTests/**'
          if-no-files-found: ignore
          retention-days: 7
