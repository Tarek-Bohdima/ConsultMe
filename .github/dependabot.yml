version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "Tarek-Bohdima"
    assignees:
      - "Tarek-Bohdima"
    commit-message:
      prefix: "chore"
      include: "scope"

    ignore:
      # AGP 9.x removes the kotlin-android plugin requirement and bumps Gradle
      # to 9.4+. Defer until that migration is done in a dedicated change.
      - dependency-name: "com.android.application"
        update-types: ["version-update:semver-major"]
      - dependency-name: "com.android.library"
        update-types: ["version-update:semver-major"]
      # Hilt 2.59+ requires AGP 9. Hold at 2.58.x until the AGP 9 migration.
      - dependency-name: "com.google.dagger.hilt.android"
        versions: [">=2.59"]
      # Kotlin 2.3.20+ promotes -Xcontext-receivers from warning to a hard
      # error in release variants, breaking compileReleaseKotlin in
      # :core-testing and the feature module. Hold until the migration to
      # -Xcontext-parameters is done (tracked in docs/IMPROVEMENT_PLAN.md).
      - dependency-name: "org.jetbrains.kotlin.android"
        versions: [">=2.3.20"]
      - dependency-name: "org.jetbrains.kotlin.plugin.compose"
        versions: [">=2.3.20"]

    # Group related dependency updates into single pull requests
    groups:
      # Group all Gradle and build plugin updates
      gradle-and-plugins:
        patterns:
          - "com.android.application"
          - "com.android.library"
          - "com.google.devtools.ksp"
          - "com.google.dagger.hilt.android"
          - "com.diffplug.spotless"
          - "io.gitlab.arturbosch.detekt"

      # Group all AndroidX updates
      androidx:
        patterns:
          - "androidx.*"
          - "com.google.android.material:material"

      # Group all Jetpack Compose updates
      jetpack-compose:
        patterns:
          - "androidx.compose.*"

      # Group all Kotlin and Coroutines updates
      kotlin-and-coroutines:
        patterns:
          - "org.jetbrains.kotlin.*"
          - "org.jetbrains.kotlinx.*"

      # Group common testing libraries
      testing-libs:
        patterns:
          - "junit:junit"
          - "androidx.test.*"
          - "org.mockito.*"
          - "app.cash.turbine:turbine"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
